kind = "web"
previewPath = "/"
title = "Lex Superior"
version = "1.0.0"
id = "artifacts/lex-superior"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23933

[services.development]
run = "pnpm --filter @workspace/lex-superior run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lex-superior", "run", "build" ]
publicDir = "artifacts/lex-superior/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23933"
BASE_PATH = "/"
